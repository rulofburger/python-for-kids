project:
  type: book
  output-dir: _book

book:
  title: "Python for Beginners"
  subtitle: "A hands-on coding course for curious learners"
  author: "Rulof Burger"
  search: true
  page-navigation: true
  reader-mode: true
  chapters:
    - index.qmd
    - setup.qmd
    - lessons/positron_intro.qmd

    - part: "Core Lessons"
      chapters:
        - lessons/python_lesson_1.qmd
        - lessons/python_lesson_2.qmd
        - lessons/python_lesson_3.qmd

    - part: "Mini Projects"
      chapters:
        - projects/mini_project_1_quiz_game.qmd

    - part: "More Core Lessons"
      chapters:
        - lessons/python_lesson_4.qmd
        - lessons/python_lesson_5.qmd

    - part: "More Mini Projects"
      chapters:
        - projects/mini_project_2_guess_the_number.qmd

    - part: "Strings, Functions and Randomness"
      chapters:
        - lessons/python_lesson_6.qmd
        - lessons/python_lesson_7.qmd
        - lessons/python_lesson_8.qmd

    - part: "Game Project"
      chapters:
        - projects/mini_project_3_dice_game.qmd

    - part: "Files, Dictionaries and Debugging"
      chapters:
        - lessons/python_lesson_9.qmd
        - lessons/python_lesson_10.qmd
        - lessons/python_lesson_11.qmd

    - part: "Study Tool Project"
      chapters:
        - projects/mini_project_4_flashcard_trainer.qmd

    - part: "Project Library"
      chapters:
        - projects/index.qmd

    - part: "Extra Challenges"
      chapters:
        - challenges/index.qmd


format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    number-sections: true
    smooth-scroll: true

execute:
  eval: false
  echo: true
  warning: false
  message: false
