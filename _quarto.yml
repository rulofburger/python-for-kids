project:
  type: book
  output-dir: _book

book:
  title: "Python for Beginners"
  subtitle: "From first program to small useful projects"
  author: "Rulof Burger"
  search: true
  page-navigation: true
  reader-mode: true
  chapters:
    - index.qmd
    - setup.qmd
    - lessons/positron_intro.qmd
    - part: "Part 1: Getting Started"
      chapters:
        - lessons/python_lesson_1.qmd
        - lessons/python_lesson_2.qmd
        - lessons/python_lesson_3.qmd
        - projects/mini_project_1_quiz_game.qmd
    - part: "Part 2: Loops, Lists and Games"
      chapters:
        - lessons/python_lesson_4.qmd
        - lessons/python_lesson_5.qmd
        - projects/mini_project_2_guess_the_number.qmd
    - part: "Part 3: Strings, Functions and Randomness"
      chapters:
        - lessons/python_lesson_6.qmd
        - lessons/python_lesson_7.qmd
        - lessons/python_lesson_8.qmd
        - projects/mini_project_3_dice_game.qmd
    - part: "Part 4: Files, Dictionaries and Debugging"
      chapters:
        - lessons/python_lesson_9.qmd
        - lessons/python_lesson_10.qmd
        - lessons/python_lesson_11.qmd
        - projects/mini_project_4_flashcard_trainer.qmd
    - part: "Part 5: Becoming a Capable Beginner"
      chapters:
        - lessons/python_lesson_12.qmd
        - lessons/python_lesson_13.qmd
        - lessons/python_lesson_14.qmd
        - lessons/python_lesson_15.qmd
        - lessons/python_lesson_16.qmd
        - lessons/python_lesson_17.qmd
        - lessons/python_lesson_18.qmd
        - projects/mini_project_5_score_tracker.qmd
        - projects/mini_project_6_personal_notebook.qmd
        - projects/final_project_beginner_program.qmd
    - part: "Project Library"
      chapters:
        - projects/index.qmd
    - part: "Extra Challenges"
      chapters:
        - challenges/index.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    number-sections: true
    smooth-scroll: true

execute:
  eval: false
  echo: true
  warning: false
  message: false
